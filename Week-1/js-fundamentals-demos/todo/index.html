<!doctype html>
<html lang="en">
  <head>
    <title>To-Do List</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>To-Do List</h1>

      <form id="todo-form">
        <input
          type="text"
          id="task-input"
          placeholder="What needs to be done?"
          required
        />
        <button type="submit">Add Task</button>
      </form>

      <ul id="task-list" class="task-list"></ul>
    </div>

    <script src="script.js"></script>
  </body>
</html>
